<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyze Review - DART</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">DART</div>
            <div class="nav-links">
                <a href="/index.html">Home</a>
                <a href="/pages/analyze.html" class="active">Analyze Review</a>
                <a href="/pages/about.html">About</a>
                <a href="/pages/settings.html">Settings</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="analysis-panel">
            <h2>Analyze Product Review</h2>
            <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Submit a review to check its authenticity</p>

            <div class="form-group">
                <label>Review Text *</label>
                <textarea rows="5" id="reviewText" placeholder="Paste the product review here..."></textarea>
            </div>

            <div class="form-group">
                <label>Star Rating (1-5)</label>
                <input type="number" id="rating" min="1" max="5" placeholder="Optional">
            </div>

            <div class="form-group">
                <label>Product Image (Optional)</label>
                <div class="file-upload" onclick="document.getElementById('imageInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Click to upload product photo</p>
                </div>
                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImage(this)">
                <img id="preview" class="preview-image" style="display: none;">
            </div>

            <button class="btn-primary" onclick="analyzeReview()">Analyze Review →</button>

            <div class="loading" id="loading">
                <i class="fas fa-spinner fa-spin"></i> Analyzing...
            </div>

            <div id="result" style="display: none;"></div>
        </div>
    </div>

    <script src="/js/dart-api.js"></script>
    <script src="/js/nav.js"></script>
    <script>
        function previewImage(input) {
            const preview = document.getElementById('preview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
