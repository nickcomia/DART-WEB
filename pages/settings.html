<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - DART</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">DART</div>
            <div class="nav-links">
                <a href="/index.html">Home</a>
                <a href="/pages/analyze.html">Analyze Review</a>
                <a href="/pages/about.html">About</a>
                <a href="/pages/settings.html" class="active">Settings</a>
            </div>
        </div>
    </nav>

    <div class="settings-container">
        <h2>System Preferences</h2>
        <div class="setting-item">
            <label>Risk Sensitivity</label>
            <select id="sensitivity">
                <option value="standard">Standard (Balanced)</option>
                <option value="strict">Strict (More False Positives)</option>
                <option value="lenient">Lenient (Fewer Flags)</option>
            </select>
        </div>
        <div class="setting-item">
            <label>Analysis Depth</label>
            <select id="depth">
                <option value="fast">Fast (Basic Checks)</option>
                <option value="detailed" selected>Detailed (Full Analysis)</option>
                <option value="comprehensive">Comprehensive (Max Accuracy)</option>
            </select>
        </div>
        <div class="setting-item">
            <label>API Endpoint</label>
            <input type="text" id="apiUrl" value="http://localhost:3000/api/analyze">
        </div>
        <button class="save-btn" onclick="saveSettings()">Save Settings</button>
        <p style="margin-top: 1rem; color: var(--text-secondary); font-size: 0.875rem;">Settings are saved locally in your browser.</p>
    </div>

    <script src="/js/nav.js"></script>
    <script>
        function saveSettings() {
            localStorage.setItem('dart_sensitivity', document.getElementById('sensitivity').value);
            localStorage.setItem('dart_depth', document.getElementById('depth').value);
            localStorage.setItem('dart_api_url', document.getElementById('apiUrl').value);
            alert('Settings saved successfully!');
        }

        window.onload = function() {
            if (localStorage.getItem('dart_sensitivity')) 
                document.getElementById('sensitivity').value = localStorage.getItem('dart_sensitivity');
            if (localStorage.getItem('dart_depth')) 
                document.getElementById('depth').value = localStorage.getItem('dart_depth');
            if (localStorage.getItem('dart_api_url')) 
                document.getElementById('apiUrl').value = localStorage.getItem('dart_api_url');
        }
    </script>
</body>
</html>
